spring:
  application:
    name: task-board-backend

  datasource:
    # env-var が無い場合は localhost:5432 (docker-compose) にフォールバック。
    # 本番(EC2+RDS)では ~/.env で上書き、ローカル開発では default のまま動作。
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/taskboard}
    username: ${DATABASE_USERNAME:taskboard}
    password: ${DATABASE_PASSWORD:taskboard}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

# CORS で許可するオリジン（カンマ区切り）
# 環境変数 CORS_ALLOWED_ORIGINS で上書き可能
# 本番(EC2)では ~/.env で http://<EIP>:5173 を含む値に設定すること
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health,info
